function showToast(msg, duration) {
  duration = duration || 2500;
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  t.classList.remove('fade');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() {
    t.classList.add('fade');
    t.classList.remove('show');
  }, duration);
}

function triggerUpdate() {
  var msg = '更新临沧酒店数据';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(msg).then(function() {
      showToast('✅ 已复制！请到微信粘贴发送给我');
    }).catch(function() {
      fallbackCopy(msg);
    });
  } else {
    fallbackCopy(msg);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('✅ 已复制！请到微信粘贴发送给我');
  } catch(e) {
    showToast('📋 请复制: ' + text, 4000);
  }
  document.body.removeChild(ta);
}

function renderStats() {
  var h = DATA.hotels;
  var prices = h.map(function(x){return parseInt(x.price)||0}).filter(function(x){return x>0});
  var scores = h.map(function(x){return parseFloat(x.score)||0}).filter(function(x){return x>0});
  var totalReviews = h.reduce(function(s,x){return s+(parseInt(x.reviews)||0)},0);
  document.getElementById('stats').innerHTML = 
    '<div class="stat-card"><div class="stat-value">'+h.length+'</div><div class="stat-label">酒店总数</div></div>'+
    '<div class="stat-card"><div class="stat-value">¥'+Math.round(prices.reduce(function(a,b){return a+b},0)/prices.length)+'</div><div class="stat-label">均价</div></div>'+
    '<div class="stat-card"><div class="stat-value">¥'+Math.min.apply(null,prices)+'~'+Math.max.apply(null,prices)+'</div><div class="stat-label">价格区间</div></div>'+
    '<div class="stat-card"><div class="stat-value">'+(scores.reduce(function(a,b){return a+b},0)/scores.length).toFixed(1)+'</div><div class="stat-label">均分</div></div>'+
    '<div class="stat-card"><div class="stat-value">'+totalReviews.toLocaleString()+'</div><div class="stat-label">总点评</div></div>';
  document.getElementById('totalCount').textContent = '共'+h.length+'家';
}

function imgRow(imgs) {
  if (!imgs||imgs.length===0) return '';
  return '<div class="img-strip">'+imgs.slice(0,8).map(function(u){return '<img src="'+u+'" loading="lazy" onerror="this.style.display=\'none\'">'}).join('')+'</div>';
}

function renderRooms(rooms) {
  if (!rooms||rooms.length===0) return '<div class="no-data">暂无房型数据</div>';
  return rooms.map(function(r){
    var details = [r.bed_type, r.breakfast, r.area, r.floor, r.wifi, r.cancel_policy].filter(Boolean).join(' | ');
    return '<div class="room-row">'+
      '<div class="room-name">'+(r.name||'')+'</div>'+
      '<div class="room-price">¥'+(r.price||'')+'</div>'+
      (details?'<div class="room-detail">'+details+'</div>':'')+
    '</div>';
  }).join('');
}

function renderReviews(reviews) {
  if (!reviews||reviews.length===0) return '<div class="no-data">暂无评价</div>';
  return reviews.map(function(r){
    return '<div class="review-item">'+
      '<span class="review-author">'+(r.author||'')+'</span>'+
      (r.date?'<span class="review-date">'+r.date+'</span>':'')+
      '<div class="review-text">'+(r.text||'')+'</div>'+
    '</div>';
  }).join('');
}

function scoreClass(s) { var v=parseFloat(s); return v>=4.5?'score-high':v>=4?'score-mid':''; }

function renderHotel(h) {
  var mainImg = h.images&&h.images.length>0 ? h.images[0] : '';
  var reviewData = h.reviews_data || h.reviews || [];
  return '<div class="hotel-card">'+
    '<div class="hotel-header">'+
      (mainImg?'<img class="hotel-img" src="'+mainImg+'" loading="lazy" onerror="this.style.display=\'none\'">':'')+
      '<div class="hotel-info">'+
        '<div class="hotel-name">'+h.name+'</div>'+
        '<div class="hotel-meta">'+(h.location||'')+'</div>'+
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px">'+
          '<span class="hotel-score '+scoreClass(h.score)+'">⭐ '+(h.score||'?')+'</span>'+
          '<span style="font-size:.82em;color:#94a3b8">'+(h.rating_label||'')+' · '+(h.reviews||'0').toLocaleString()+'条点评</span>'+
        '</div>'+
        '<div style="margin-top:8px">'+
          '<span class="price-tag">¥'+(h.price||'?')+'</span>'+
          (h.original_price?'<span class="price-orig">¥'+h.original_price+'</span>':'')+
        '</div>'+
      '</div>'+
    '</div>'+
    imgRow((h.images||[]).slice(1))+
    '<div class="room-section">'+
      '<div class="section-title">🛏️ 房型 ('+(h.rooms||[]).length+')</div>'+
      renderRooms(h.rooms)+
    '</div>'+
    '<div class="review-section">'+
      '<div class="section-title">💬 住客评价 ('+reviewData.length+')</div>'+
      renderReviews(reviewData)+
    '</div>'+
  '</div>';
}

function sortHotels() {
  var by = document.getElementById('sortBy').value;
  var h = DATA.hotels;
  var fn = {
    price: function(a,b){return (parseInt(a.price)||0)-(parseInt(b.price)||0)},
    score: function(a,b){return (parseFloat(b.score)||0)-(parseFloat(a.score)||0)},
    reviews: function(a,b){return (parseInt(b.reviews)||0)-(parseInt(a.reviews)||0)}
  };
  h.sort(fn[by]);
  document.getElementById('hotels').innerHTML = h.map(renderHotel).join('');
}

(function init() {
  if (DATA.updated_at) {
    document.getElementById('updateTime').textContent = '🕐 数据更新: ' + DATA.updated_at;
  }
  renderStats();
  sortHotels();
})();
</script>
