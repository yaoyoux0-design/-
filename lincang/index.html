function triggerUpdate(){
  var m='更新临沧酒店数据';
  if(navigator.clipboard){navigator.clipboard.writeText(m).then(function(){alert('已复制！到微信发送给我')})}
  else{prompt('复制后到微信发送给我:',m)}
}

function render(){
  var hotels=DATA.hotels||[];
  var dist=document.getElementById('districtFilter').value;
  var sort=document.getElementById('sortBy').value;
  
  if(dist!=='全部') hotels=hotels.filter(function(h){return h.district===dist});
  
  hotels.sort(function(a,b){
    if(sort==='score') return (parseFloat(b.score)||0)-(parseFloat(a.score)||0);
    if(sort==='reviews') return (parseInt(b.reviews_count)||0)-(parseInt(a.reviews_count)||0);
    return (parseInt(a.price)||99999)-(parseInt(b.price)||99999);
  });
  
  // Stats
  var scores=hotels.map(function(h){return parseFloat(h.score)||0}).filter(function(s){return s>0});
  var reviews=hotels.reduce(function(s,h){return s+(parseInt(h.reviews_count)||0)},0);
  var avgS=scores.length?(scores.reduce(function(a,b){return a+b},0)/scores.length).toFixed(1):'?';
  document.getElementById('stats').innerHTML=
    '<div class="stat-card"><div class="stat-value">'+hotels.length+'</div><div class="stat-label">酒店</div></div>'+
    '<div class="stat-card"><div class="stat-value">'+avgS+'</div><div class="stat-label">均分</div></div>'+
    '<div class="stat-card"><div class="stat-value">'+reviews.toLocaleString()+'</div><div class="stat-label">总点评</div></div>';
  
  // Hotel cards
  var html='';
  hotels.forEach(function(h){
    var img=h.images&&h.images.length>0?h.images[0]:'';
    var moreImgs=(h.images||[]).slice(1,8);
    var sc=parseFloat(h.score)||0;
    var scCls=sc>=4.5?'score-high':sc>=4?'score-mid':'';
    var distTag=h.district?'<span class="district-tag">📍'+h.district+'</span>':'';
    var rc=h.reviews_count||'0';
    var price=h.price||'?';
    
    html+='<div class="hotel-card"><div class="hotel-header">';
    if(img) html+='<img class="hotel-img" src="'+img+'" loading="lazy" onerror="this.remove()">';
    html+='<div class="hotel-info">';
    html+='<div class="hotel-name">'+distTag+(h.name||'')+'</div>';
    html+='<div class="hotel-meta">'+(h.location||'')+'</div>';
    html+='<span class="hotel-score '+scCls+'">⭐ '+h.score+'</span>';
    html+=' <span style="font-size:.8em;color:#94a3b8">'+(h.rating_label||'')+' · '+parseInt(rc).toLocaleString()+'条点评</span>';
    html+='<div style="margin-top:6px"><span class="price-tag">¥'+price+'</span></div>';
    html+='</div></div>';
    if(moreImgs.length>0){
      html+='<div class="img-strip">';
      moreImgs.forEach(function(u){html+='<img src="'+u+'" loading="lazy" onerror="this.remove()">'});
      html+='</div>';
    }
    html+='</div>';
  });
  document.getElementById('hotels').innerHTML=html||'<div style="text-align:center;color:#64748b;padding:40px">暂无酒店数据</div>';
}

// Init districts
(function(){
  var districts={};
  (DATA.hotels||[]).forEach(function(h){
    var d=h.district||'未知';
    districts[d]=(districts[d]||0)+1;
  });
  var sel=document.getElementById('districtFilter');
  Object.keys(districts).sort().forEach(function(k){
    var o=document.createElement('option');
    o.value=k;o.textContent=k+' ('+districts[k]+')';
    sel.appendChild(o);
  });
})();

// Set update time
if(DATA.updated_at) document.getElementById('updateTime').textContent='🕐 数据更新: '+DATA.updated_at;

// Initial render
render();
</script>
