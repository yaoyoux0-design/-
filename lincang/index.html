function renderStats() {
  const h = DATA.hotels;
  const prices = h.map(x=>parseInt(x.price)||0).filter(x=>x>0);
  const scores = h.map(x=>parseFloat(x.score)||0).filter(x=>x>0);
  const totalReviews = h.reduce((s,x)=>s+(parseInt(x.reviews)||0),0);
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-value">${h.length}</div><div class="stat-label">酒店总数</div></div>
    <div class="stat-card"><div class="stat-value">¥${Math.round(prices.reduce((a,b)=>a+b,0)/prices.length)}</div><div class="stat-label">均价</div></div>
    <div class="stat-card"><div class="stat-value">¥${Math.min(...prices)}~${Math.max(...prices)}</div><div class="stat-label">价格区间</div></div>
    <div class="stat-card"><div class="stat-value">${(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1)}</div><div class="stat-label">均分</div></div>
    <div class="stat-card"><div class="stat-value">${totalReviews.toLocaleString()}</div><div class="stat-label">总点评</div></div>
  `;
  document.getElementById('totalCount').textContent = `共${h.length}家`;
}

function imgRow(imgs) {
  if (!imgs||imgs.length===0) return '';
  return '<div class="img-strip">'+imgs.slice(0,8).map(u=>`<img src="${u}" loading="lazy" onerror="this.style.display='none'">`).join('')+'</div>';
}

function renderRooms(rooms) {
  if (!rooms||rooms.length===0) return '<div class="no-data">暂无房型数据</div>';
  return rooms.map(r=>`
    <div class="room-row">
      <div class="room-name">${r.name||r.room_name||''}</div>
      <div class="room-price">¥${r.price||''}</div>
      ${r.bed_type||r.breakfast||r.size?`<div class="room-detail">${[r.bed_type,r.breakfast,r.size,r.cancel_policy].filter(Boolean).join(' | ')}</div>`:''}
    </div>`).join('');
}

function renderReviews(reviews) {
  if (!reviews||reviews.length===0) return '<div class="no-data">暂无评价</div>';
  return reviews.map(r=>`
    <div class="review-item">
      <span class="review-author">${r.author||''}</span> ${r.score?r.score+'分':''}
      <div class="review-text">${r.text||r.content||''}</div>
    </div>`).join('');
}

function scoreClass(s) { const v=parseFloat(s); return v>=4.5?'score-high':v>=4?'score-mid':''; }

function renderHotel(h) {
  const mainImg = h.images&&h.images.length>0 ? h.images[0] : '';
  return `
    <div class="hotel-card">
      <div class="hotel-header">
        ${mainImg?`<img class="hotel-img" src="${mainImg}" loading="lazy" onerror="this.style.display='none'">`:''}
        <div class="hotel-info">
          <div class="hotel-name">${h.name}</div>
          <div class="hotel-meta">${h.location||''}</div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px">
            <span class="hotel-score ${scoreClass(h.score)}">⭐ ${h.score||'?'}</span>
            <span style="font-size:.82em;color:#94a3b8">${h.rating_label||''} · ${(h.reviews||'0').toLocaleString()}条点评</span>
          </div>
          <div style="margin-top:8px">
            <span class="price-tag">¥${h.price||'?'}</span>
            ${h.original_price?`<span class="price-orig">¥${h.original_price}</span>`:''}
          </div>
        </div>
      </div>
      ${imgRow((h.images||[]).slice(1))}
      <div class="room-section">
        <div class="section-title">🛏️ 房型 (${(h.rooms||[]).length})</div>
        ${renderRooms(h.rooms)}
      </div>
      <div class="review-section">
        <div class="section-title">💬 住客评价 (${(h.reviews_data||h.reviews||[]).length})</div>
        ${renderReviews(h.reviews_data||h.reviews)}
      </div>
    </div>`;
}

function sortHotels() {
  const by = document.getElementById('sortBy').value;
  const h = DATA.hotels;
  const fn = {price:(a,b)=>(parseInt(a.price)||0)-(parseInt(b.price)||0),
              score:(a,b)=>(parseFloat(b.score)||0)-(parseFloat(a.score)||0),
              reviews:(a,b)=>(parseInt(b.reviews)||0)-(parseInt(a.reviews)||0)};
  h.sort(fn[by]);
  document.getElementById('hotels').innerHTML = h.map(renderHotel).join('');
}

(function init() {
  if (DATA.updated_at) {
    document.getElementById('updateTime').textContent = '🕐 数据更新: ' + DATA.updated_at;
  }
  renderStats();
  sortHotels();
})();
</script>
