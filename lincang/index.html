<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>临沧酒店竞品分析面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;padding:16px}
.header{text-align:center;padding:20px 0}
.header h1{font-size:1.6em;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:16px 0}
.stat-card{background:#1e293b;border-radius:12px;padding:14px;text-align:center}
.stat-value{font-size:1.4em;font-weight:700;color:#60a5fa}
.stat-label{font-size:.75em;color:#94a3b8;margin-top:4px}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:16px 0}
select,button{padding:8px 14px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:.85em}
button{background:#3b82f6;border:none;cursor:pointer;transition:all .2s}
button:hover{background:#2563eb}
button:active{transform:scale(.97)}
.btn-update{background:linear-gradient(135deg,#f59e0b,#ef4444);font-weight:700;font-size:.9em;padding:10px 20px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}50%{box-shadow:0 0 0 8px rgba(245,158,11,0)}}
.btn-update:hover{background:linear-gradient(135deg,#d97706,#dc2626)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#065f46;color:#6ee7b7;padding:12px 24px;border-radius:10px;font-size:.9em;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.fade{opacity:0}
.hotel-card{background:#1e293b;border-radius:14px;margin-bottom:16px;overflow:hidden}
.hotel-header{padding:16px;display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
.hotel-img{width:100%;max-width:280px;border-radius:10px;object-fit:cover;aspect-ratio:16/10}
.hotel-info{flex:1;min-width:200px}
.hotel-name{font-size:1.15em;font-weight:700;margin-bottom:6px}
.hotel-meta{font-size:.8em;color:#94a3b8;margin-bottom:4px}
.hotel-score{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-weight:700;font-size:.9em}
.score-high{background:#065f46;color:#6ee7b7}
.score-mid{background:#78350f;color:#fbbf24}
.price-tag{font-size:1.3em;font-weight:700;color:#f59e0b}
.price-orig{font-size:.8em;color:#64748b;text-decoration:line-through;margin-left:6px}
.sales-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:.75em;font-weight:600;margin-left:4px}
.sales-hot{background:#7c2d12;color:#fdba74}
.sales-good{background:#064e3b;color:#6ee7b7}
.district-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72em;background:#312e81;color:#a5b4fc;margin-right:6px}
.room-section,.review-section{padding:0 16px 12px}
.section-title{font-size:.85em;font-weight:700;color:#94a3b8;padding:8px 0;border-bottom:1px solid #334155;margin-bottom:8px}
.room-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e293b;font-size:.85em;flex-wrap:wrap;gap:4px}
.room-name{flex:1;min-width:140px}
.room-price{font-weight:700;color:#f59e0b;white-space:nowrap}
.room-detail{font-size:.75em;color:#94a3b8;width:100%}
.review-item{padding:8px 0;border-bottom:1px solid #1e293b;font-size:.82em}
.review-author{font-weight:600;color:#a78bfa}
.review-date{font-size:.75em;color:#64748b;margin-left:6px}
.review-text{color:#cbd5e1;margin-top:4px;line-height:1.4}
.img-strip{display:flex;gap:6px;overflow-x:auto;padding:0 16px 8px;-webkit-overflow-scrolling:touch}
.img-strip img{height:80px;border-radius:8px;flex-shrink:0;object-fit:cover}
.no-data{color:#64748b;font-style:italic;font-size:.82em;padding:8px 0}
.update-bar{text-align:center;margin:16px 0}
.update-hint{font-size:.75em;color:#64748b;margin-top:8px}
footer{text-align:center;padding:24px;color:#475569;font-size:.75em}
</style>
</head>
<body>
<div class="header"><h1>🏨 临沧酒店竞品分析</h1><div id="updateTime" style="font-size:.7em;color:#64748b;margin-top:6px"></div></div>
<div class="stats" id="stats"></div>
<div class="update-bar">
  <button class="btn-update" onclick="triggerUpdate()">🔄 一键更新数据</button>
  <div class="update-hint">点击复制指令 → 到微信发送给我 → 自动采集最新数据</div>
</div>
<div class="controls">
  <select id="districtFilter" onchange="filterHotels()">
    <option value="全部">全部区县</option>
  </select>
  <select id="sortBy">
    <option value="price">按价格</option>
    <option value="score">按评分</option>
    <option value="reviews">按点评数</option>
    <option value="sales">按近期销量</option>
  </select>
  <button onclick="filterHotels()">筛选排序</button>
  <span style="font-size:.8em;color:#94a3b8;align-self:center" id="totalCount"></span>
</div>
<div id="hotels"></div>
<footer>数据来源: 携程旅行网 | 自动采集</footer>
<div id="toast" class="toast"></div>

<script>
var DATA = {"city": "临沧", "timestamp": "2026-05-31T02:21:26.330535", "count": 0, "avg_price": 0, "avg_score": 0, "price_range": [0, 0], "hotels": [], "updated_at": "2026-05-31 02:21"};
var currentHotels = DATA.hotels || [];

function showToast(msg, d) {
  d = d || 2500;
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show'); t.classList.remove('fade');
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){t.classList.add('fade');t.classList.remove('show');}, d);
}

function triggerUpdate() {
  var msg = '更新临沧酒店数据';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(msg).then(function(){showToast('✅ 已复制！请到微信粘贴发送给我');}).catch(function(){copyFallback(msg);});
  } else { copyFallback(msg); }
}
function copyFallback(t) {
  var ta = document.createElement('textarea'); ta.value = t; ta.style.position='fixed'; ta.style.left='-9999px';
  document.body.appendChild(ta); ta.select();
  try{document.execCommand('copy');showToast('✅ 已复制！请到微信粘贴发送给我');}catch(e){showToast('📋 请复制: '+t,4000);}
  document.body.removeChild(ta);
}

function initDistricts() {
  var sel = document.getElementById('districtFilter');
  var districts = {};
  currentHotels.forEach(function(h){
    var d = h.district || '未知';
    if (!districts[d]) districts[d] = 0;
    districts[d]++;
  });
  var keys = Object.keys(districts).sort();
  keys.forEach(function(k){
    var opt = document.createElement('option');
    opt.value = k;
    opt.textContent = k + ' (' + districts[k] + ')';
    sel.appendChild(opt);
  });
}

function renderStats(filtered) {
  var h = filtered || currentHotels;
  var prices = h.map(function(x){return parseInt(x.price)||0}).filter(function(x){return x>0});
  var scores = h.map(function(x){return parseFloat(x.score)||0}).filter(function(x){return x>0});
  var totalReviews = h.reduce(function(s,x){return s+(parseInt(x.reviews_count)||parseInt(x.reviews)||0)},0);
  var totalSales = h.reduce(function(s,x){return s+(parseInt(x.sales_good)||0)},0);
  var avgP = prices.length ? Math.round(prices.reduce(function(a,b){return a+b},0)/prices.length) : 0;
  var avgS = scores.length ? (scores.reduce(function(a,b){return a+b},0)/scores.length).toFixed(1) : '?';
  var minP = prices.length ? Math.min.apply(null,prices) : 0;
  var maxP = prices.length ? Math.max.apply(null,prices) : 0;
  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="stat-value">'+h.length+'</div><div class="stat-label">酒店总数</div></div>'+
    '<div class="stat-card"><div class="stat-value">¥'+avgP+'</div><div class="stat-label">均价</div></div>'+
    '<div class="stat-card"><div class="stat-value">¥'+minP+'~'+maxP+'</div><div class="stat-label">价格区间</div></div>'+
    '<div class="stat-card"><div class="stat-value">'+avgS+'</div><div class="stat-label">均分</div></div>'+
    '<div class="stat-card"><div class="stat-value">'+totalReviews.toLocaleString()+'</div><div class="stat-label">总点评</div></div>'+
    '<div class="stat-card"><div class="stat-value">'+totalSales.toLocaleString()+'</div><div class="stat-label">近期好评</div></div>';
  document.getElementById('totalCount').textContent = '共'+h.length+'家';
}

function imgRow(imgs) {
  if (!imgs||imgs.length===0) return '';
  return '<div class="img-strip">'+imgs.slice(0,8).map(function(u){return '<img src="'+u+'" loading="lazy" onerror="this.style.display=\\'none\\'">'}).join('')+'</div>';
}

function renderRooms(rooms) {
  if (!rooms||rooms.length===0) return '<div class="no-data">暂无房型数据</div>';
  return rooms.map(function(r){
    var details = [r.bed_type, r.breakfast, r.area, r.floor, r.wifi, r.cancel_policy].filter(Boolean).join(' | ');
    return '<div class="room-row"><div class="room-name">'+(r.name||'')+'</div><div class="room-price">¥'+(r.price||'')+'</div>'+(details?'<div class="room-detail">'+details+'</div>':'')+'</div>';
  }).join('');
}

function renderReviews(reviews) {
  if (!reviews||reviews.length===0) return '<div class="no-data">暂无评价</div>';
  return reviews.map(function(r){
    return '<div class="review-item"><span class="review-author">'+(r.author||'')+'</span>'+(r.date?'<span class="review-date">'+r.date+'</span>':'')+'<div class="review-text">'+(r.text||'')+'</div></div>';
  }).join('');
}

function scoreClass(s) { var v=parseFloat(s); return v>=4.5?'score-high':v>=4?'score-mid':''; }

function salesBadge(h) {
  var parts = [];
  if (h.sales_good && parseInt(h.sales_good) > 0) {
    parts.push('<span class="sales-badge sales-good">🔥连续'+h.sales_good+'好评</span>');
  }
  if (h.sales_booked) {
    parts.push('<span class="sales-badge sales-hot">⚡'+h.sales_booked+'</span>');
  }
  return parts.join('');
}

function renderHotel(h) {
  var mainImg = h.images&&h.images.length>0 ? h.images[0] : '';
  var reviewData = h.reviews_data || h.reviews || [];
  var districtTag = h.district ? '<span class="district-tag">📍'+h.district+'</span>' : '';
  var reviewsCount = h.reviews_count || h.reviews || '0';
  return '<div class="hotel-card">'+
    '<div class="hotel-header">'+
      (mainImg?'<img class="hotel-img" src="'+mainImg+'" loading="lazy" onerror="this.style.display=\\'none\\'">':'')+
      '<div class="hotel-info">'+
        '<div class="hotel-name">'+districtTag+h.name+'</div>'+
        '<div class="hotel-meta">'+(h.location||'')+'</div>'+
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px">'+
          '<span class="hotel-score '+scoreClass(h.score)+'">⭐ '+(h.score||'?')+'</span>'+
          '<span style="font-size:.82em;color:#94a3b8">'+(h.rating_label||'')+' · '+reviewsCount.toString().toLocaleString()+'条点评</span>'+
          salesBadge(h)+
        '</div>'+
        '<div style="margin-top:8px">'+
          '<span class="price-tag">¥'+(h.price||'?')+'</span>'+
          (h.original_price?'<span class="price-orig">¥'+h.original_price+'</span>':'')+
        '</div>'+
      '</div>'+
    '</div>'+
    imgRow((h.images||[]).slice(1))+
    '<div class="room-section"><div class="section-title">🛏️ 房型 ('+(h.rooms||[]).length+')</div>'+renderRooms(h.rooms)+'</div>'+
    '<div class="review-section"><div class="section-title">💬 住客评价 ('+reviewData.length+')</div>'+renderReviews(reviewData)+'</div>'+
  '</div>';
}

function filterHotels() {
  var dist = document.getElementById('districtFilter').value;
  var by = document.getElementById('sortBy').value;
  var filtered = currentHotels;
  if (dist !== '全部') {
    filtered = currentHotels.filter(function(h){return h.district === dist;});
  }
  var fn = {
    price: function(a,b){return (parseInt(a.price)||0)-(parseInt(b.price)||0)},
    score: function(a,b){return (parseFloat(b.score)||0)-(parseFloat(a.score)||0)},
    reviews: function(a,b){return (parseInt(b.reviews)||parseInt(b.reviews_count)||0)-(parseInt(a.reviews)||parseInt(a.reviews_count)||0)},
    sales: function(a,b){return (parseInt(b.sales_good)||0)-(parseInt(a.sales_good)||0)}
  };
  filtered.sort(fn[by]);
  document.getElementById('hotels').innerHTML = filtered.map(renderHotel).join('');
  renderStats(filtered);
}

(function init() {
  // Normalize data
  currentHotels = DATA.hotels || [];
  currentHotels.forEach(function(h){
    if (!h.district) h.district = '临翔区';
  });
  if (DATA.updated_at) {
    document.getElementById('updateTime').textContent = '🕐 数据更新: ' + DATA.updated_at;
  }
  initDistricts();
  renderStats(currentHotels);
  filterHotels();
})();
</script>
</body>
</html>
