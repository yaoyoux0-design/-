<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>临沧酒店竞品分析面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;padding:16px}
h1{text-align:center;font-size:1.5em;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:16px 0}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin:12px 0}
.stat-card{background:#1e293b;border-radius:10px;padding:12px;text-align:center}
.stat-value{font-size:1.3em;font-weight:700;color:#60a5fa}
.stat-label{font-size:.7em;color:#94a3b8;margin-top:3px}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:12px 0}
select,button{padding:8px 12px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:.82em}
button{background:#3b82f6;border:none;cursor:pointer}
.btn-update{background:linear-gradient(135deg,#f59e0b,#ef4444);font-weight:700;padding:10px 18px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}50%{box-shadow:0 0 0 8px rgba(245,158,11,0)}}
.hotel-card{background:#1e293b;border-radius:12px;margin-bottom:14px;overflow:hidden}
.hotel-header{padding:14px;display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.hotel-img{width:100%;max-width:240px;border-radius:8px;object-fit:cover;aspect-ratio:16/10}
.hotel-info{flex:1;min-width:180px}
.hotel-name{font-size:1.05em;font-weight:700;margin-bottom:4px}
.hotel-meta{font-size:.78em;color:#94a3b8;margin-bottom:3px}
.hotel-score{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-weight:700;font-size:.85em}
.score-high{background:#065f46;color:#6ee7b7}
.score-mid{background:#78350f;color:#fbbf24}
.price-tag{font-size:1.2em;font-weight:700;color:#f59e0b}
.district-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.7em;background:#312e81;color:#a5b4fc;margin-right:5px}
.img-strip{display:flex;gap:5px;overflow-x:auto;padding:0 14px 8px;-webkit-overflow-scrolling:touch}
.img-strip img{height:70px;border-radius:6px;flex-shrink:0;object-fit:cover}
.update-hint{text-align:center;font-size:.7em;color:#64748b;margin-top:4px}
footer{text-align:center;padding:20px;color:#475569;font-size:.7em}
#updateTime{text-align:center;font-size:.7em;color:#64748b;margin-top:4px}
</style>
</head>
<body>
<h1>🏨 临沧酒店竞品分析</h1>
<div id="updateTime"></div>
<div class="stats" id="stats"></div>
<div style="text-align:center;margin:12px 0">
  <button class="btn-update" onclick="triggerUpdate()">🔄 一键更新数据</button>
  <div class="update-hint">点击复制指令 → 到微信发送给我</div>
</div>
<div class="controls">
  <select id="districtFilter" onchange="render()"><option value="全部">全部区县</option></select>
  <select id="sortBy" onchange="render()">
    <option value="score">按评分</option>
    <option value="reviews">按点评数</option>
    <option value="price">按价格</option>
  </select>
</div>
<div id="hotels"></div>
<footer>数据来源: 携程旅行网 | 自动采集</footer>

<script>
var DATA = {"city": "临沧", "count": 0, "avg_price": 0, "hotels": []};

function triggerUpdate(){
  var m='更新临沧酒店数据';
  if(navigator.clipboard){navigator.clipboard.writeText(m).then(function(){alert('已复制！到微信发送给我')})}
  else{prompt('复制后到微信发送给我:',m)}
}

function render(){
  var hotels=DATA.hotels||[];
  var dist=document.getElementById('districtFilter').value;
  var sort=document.getElementById('sortBy').value;
  
  if(dist!=='全部') hotels=hotels.filter(function(h){return h.district===dist});
  
  hotels.sort(function(a,b){
    if(sort==='score') return (parseFloat(b.score)||0)-(parseFloat(a.score)||0);
    if(sort==='reviews') return (parseInt(b.reviews_count)||0)-(parseInt(a.reviews_count)||0);
    return (parseInt(a.price)||99999)-(parseInt(b.price)||99999);
  });
  
  // Stats
  var scores=hotels.map(function(h){return parseFloat(h.score)||0}).filter(function(s){return s>0});
  var reviews=hotels.reduce(function(s,h){return s+(parseInt(h.reviews_count)||0)},0);
  var avgS=scores.length?(scores.reduce(function(a,b){return a+b},0)/scores.length).toFixed(1):'?';
  document.getElementById('stats').innerHTML=
    '<div class="stat-card"><div class="stat-value">'+hotels.length+'</div><div class="stat-label">酒店</div></div>'+
    '<div class="stat-card"><div class="stat-value">'+avgS+'</div><div class="stat-label">均分</div></div>'+
    '<div class="stat-card"><div class="stat-value">'+reviews.toLocaleString()+'</div><div class="stat-label">总点评</div></div>';
  
  // Hotel cards
  var html='';
  hotels.forEach(function(h){
    var img=h.images&&h.images.length>0?h.images[0]:'';
    var moreImgs=(h.images||[]).slice(1,8);
    var sc=parseFloat(h.score)||0;
    var scCls=sc>=4.5?'score-high':sc>=4?'score-mid':'';
    var distTag=h.district?'<span class="district-tag">📍'+h.district+'</span>':'';
    var rc=h.reviews_count||'0';
    var price=h.price||'?';
    
    html+='<div class="hotel-card"><div class="hotel-header">';
    if(img) html+='<img class="hotel-img" src="'+img+'" loading="lazy" onerror="this.remove()">';
    html+='<div class="hotel-info">';
    html+='<div class="hotel-name">'+distTag+(h.name||'')+'</div>';
    html+='<div class="hotel-meta">'+(h.location||'')+'</div>';
    html+='<span class="hotel-score '+scCls+'">⭐ '+h.score+'</span>';
    html+=' <span style="font-size:.8em;color:#94a3b8">'+(h.rating_label||'')+' · '+parseInt(rc).toLocaleString()+'条点评</span>';
    html+='<div style="margin-top:6px"><span class="price-tag">¥'+price+'</span></div>';
    html+='</div></div>';
    if(moreImgs.length>0){
      html+='<div class="img-strip">';
      moreImgs.forEach(function(u){html+='<img src="'+u+'" loading="lazy" onerror="this.remove()">'});
      html+='</div>';
    }
    html+='</div>';
  });
  document.getElementById('hotels').innerHTML=html||'<div style="text-align:center;color:#64748b;padding:40px">暂无酒店数据</div>';
}

// Init districts
(function(){
  var districts={};
  (DATA.hotels||[]).forEach(function(h){
    var d=h.district||'未知';
    districts[d]=(districts[d]||0)+1;
  });
  var sel=document.getElementById('districtFilter');
  Object.keys(districts).sort().forEach(function(k){
    var o=document.createElement('option');
    o.value=k;o.textContent=k+' ('+districts[k]+')';
    sel.appendChild(o);
  });
})();

// Set update time
if(DATA.updated_at) document.getElementById('updateTime').textContent='🕐 数据更新: '+DATA.updated_at;

// Initial render
render();
</script>
</body>
</html>
